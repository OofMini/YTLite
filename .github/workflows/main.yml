name: Create YouTube Plus app

on:
  workflow_dispatch:
    inputs:
      enable_youpip:
        description: "Integrate YouPiP"
        type: boolean
        required: true
        default: false

      enable_ytuhd:
        description: "Integrate YTUHD"
        type: boolean
        required: true
        default: false

      enable_yq:
        description: "Integrate YouQuality"
        type: boolean
        required: true
        default: false

      enable_ryd:
        description: "Integrate Return YouTube Dislikes"
        type: boolean
        required: true
        default: false

      enable_demc:
        description: "Integrate DontEatMyContent"
        type: boolean
        required: true
        default: false

      ipa_url:
        description: "URL to the decrypted IPA file"
        default: ""
        required: true
        type: string

      tweak_version:
        description: "The version of the tweak to use. Enter the version manually from dayanch96/YTLite/releases or leave default"
        default: "5.2b4"
        required: true
        type: string

      display_name:
        description: "App Name (Optional)"
        default: "YouTube"
        required: true
        type: string

      bundle_id:
        description: "BundleID (Optional)"
        default: "com.github.ytlite.youtube"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Main
        uses: actions/checkout@v4.2.2
        with:
          path: main
          submodules: recursive

      - name: Hide sensitive inputs
        uses: levibostian/action-hide-sensitive-inputs@v1
        with:
          exclude_inputs: bundle_id,display_name,enable_demc,enable_ryd,enable_youpip,enable_yq,enable_ytuhd,tweak_version

      - name: Validate IPA URL
        run: |
          url="${{ inputs.ipa_url }}"
          if [[ ! "$url" =~ ^https?:// ]]; then
            echo "::error::Invalid URL format. Must start with http:// or https://"
            exit 1
          fi

      - name: Download and validate IPA
        run: |
          set -e
          wget "${{ inputs.ipa_url }}" --no-verbose -O youtube.ipa || {
            echo "::error::Failed to download IPA from provided URL"
            exit 1
          }

          file_type=$(file --mime-type -b youtube.ipa)

          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Validation failed: The downloaded file is not a valid IPA. Detected type: $file_type."
            exit 1
          fi

          size=$(stat -f%z youtube.ipa)
          echo "::notice::Downloaded IPA size: $size bytes"

      - name: Install Dependencies
        run: brew install make ldid

      - name: Set PATH environment variable
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Cache Theos
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_demc }}
        id: theos
        uses: actions/cache@v4.2.0
        env:
          cache-name: theos-cache
        with:
          path: theos/
          key: ${{ runner.os }}-${{ env.cache-name }}-67db2ab-${{ hashFiles('**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.cache-name }}-67db2ab-
            ${{ runner.os }}-${{ env.cache-name }}-

      - name: Setup Theos
        if: ${{ (inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_demc) && steps.theos.outputs.cache-hit != 'true' }}
        uses: actions/checkout@v4.2.2
        with:
          repository: theos/theos
          ref: 67db2ab8d950910161730de77c322658ea3e6b44
          path: theos
          submodules: recursive

      - name: Download iOS SDK
        if: ${{ (inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_demc) && steps.theos.outputs.cache-hit != 'true' }}
        run: |
          set -e
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/theos/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv *.sdk $THEOS/sdks
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Install cyan
        run: |
          set -e
          pipx install https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Download YouTube Plus
        run: |
          set -e
          deb_url="https://github.com/dayanch96/YTLite/releases/download/v${{ inputs.tweak_version }}/com.dvntm.ytlite_${{ inputs.tweak_version }}_iphoneos-arm.deb"
          wget "$deb_url" --no-verbose -O ytplus.deb || {
            echo "::error::Failed to download YouTube Plus tweak"
            exit 1
          }

      - name: Clone Open in YouTube (Safari extension)
        run: |
          set -e
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/CokePokes/YoutubeExtensions/
          cd YoutubeExtensions
          git sparse-checkout set --no-cone OpenYoutubeSafariExtension.appex
          git checkout
          mv *.appex ${{ github.workspace }}

      - name: Clone YouTubeHeader
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_demc }}
        run: |
          set -e
          if [ -d "$THEOS/include/YouTubeHeader" ]; then
            echo "YouTubeHeader exists. Pulling latest changes..."
            cd $THEOS/include/YouTubeHeader
            git pull
          else
            echo "YouTubeHeader does not exist. Cloning repository..."
            cd $THEOS/include
            git clone --quiet --depth=1 https://github.com/PoomSmart/YouTubeHeader.git
          fi

          if [ "${{ inputs.enable_demc }}" = "true" ]; then
            echo "Copying YouTubeHeader to YTHeaders..."
            rm -rf "$THEOS/include/YTHeaders"
            cp -r "$THEOS/include/YouTubeHeader" "$THEOS/include/YTHeaders"
          fi
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Clone PSHeader
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_demc }}
        run: |
          set -e
          if [ -d "$THEOS/include/PSHeader" ]; then
            echo "PSHeader exists. Pulling latest changes..."
            cd $THEOS/include/PSHeader
            git pull
          else
            echo "PSHeader does not exist. Cloning repository..."
            cd $THEOS/include
            git clone --quiet --depth=1 https://github.com/PoomSmart/PSHeader.git
          fi
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Clone YouPiP
        if: ${{ inputs.enable_youpip }}
        run: |
          set -e
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouPiP.git

      - name: Clone YTUHD
        if: ${{ inputs.enable_ytuhd }}
        uses: actions/checkout@v4.2.2
        with:
          repository: Tonwalter888/YTUHD
          path: YTUHD

      - name: Clone Return-YouTube-Dislikes
        if: ${{ inputs.enable_ryd }}
        run: |
          set -e
          git clone --quiet --depth=1 https://github.com/PoomSmart/Return-YouTube-Dislikes.git

      - name: Clone YouGroupSettings
        if: ${{ inputs.enable_demc }}
        run: |
          set -e
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouGroupSettings.git

      - name: Clone YouQuality
        if: ${{ inputs.enable_yq }}
        run: |
          set -e
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouQuality.git

      - name: Clone YTVideoOverlay
        if: ${{ inputs.enable_yq || inputs.enable_youpip }}
        run: |
          set -e
          git clone --quiet --depth=1 https://github.com/PoomSmart/YTVideoOverlay.git

      - name: Clone DontEatMyContent
        if: ${{ inputs.enable_demc }}
        run: |
          set -e
          git clone --quiet --depth=1 --recurse-submodules https://github.com/therealFoxster/DontEatMyContent.git

      - name: Build YouPiP
        if: ${{ inputs.enable_youpip }}
        run: |
          set -e
          cd YouPiP
          make clean package DEBUG=0 FINALPACKAGE=1 || {
            echo "::error::Failed to build YouPiP"
            exit 1
          }
          if [ ! -f packages/*.deb ]; then
            echo "::error::YouPiP deb file not created"
            exit 1
          fi
          mv packages/*.deb ${{ github.workspace }}/youpip.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build YTUHD
        if: ${{ inputs.enable_ytuhd }}
        run: |
          set -e
          cd YTUHD
          make clean package DEBUG=0 FINALPACKAGE=1 || {
            echo "::error::Failed to build YTUHD"
            exit 1
          }
          if [ ! -f packages/*.deb ]; then
            echo "::error::YTUHD deb file not created"
            exit 1
          fi
          mv packages/*.deb ${{ github.workspace }}/ytuhd.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build Return-YouTube-Dislikes
        if: ${{ inputs.enable_ryd }}
        run: |
          set -e
          cd Return-YouTube-Dislikes
          make clean package DEBUG=0 FINALPACKAGE=1 || {
            echo "::error::Failed to build Return-YouTube-Dislikes"
            exit 1
          }
          if [ ! -f packages/*.deb ]; then
            echo "::error::Return-YouTube-Dislikes deb file not created"
            exit 1
          fi
          mv packages/*.deb ${{ github.workspace }}/ryd.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build YouGroupSettings
        if: ${{ inputs.enable_demc }}
        run: |
          set -e
          cd YouGroupSettings
          make clean package DEBUG=0 FINALPACKAGE=1 || {
            echo "::error::Failed to build YouGroupSettings"
            exit 1
          }
          if [ ! -f packages/*.deb ]; then
            echo "::error::YouGroupSettings deb file not created"
            exit 1
          fi
          mv packages/*.deb ${{ github.workspace }}/ygs.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build YouQuality
        if: ${{ inputs.enable_yq }}
        run: |
          set -e
          cd YouQuality
          make clean package DEBUG=0 FINALPACKAGE=1 || {
            echo "::error::Failed to build YouQuality"
            exit 1
          }
          if [ ! -f packages/*.deb ]; then
            echo "::error::YouQuality deb file not created"
            exit 1
          fi
          mv packages/*.deb ${{ github.workspace }}/yq.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build YTVideoOverlay
        if: ${{ inputs.enable_yq || inputs.enable_youpip }}
        run: |
          set -e
          cd YTVideoOverlay
          make clean package DEBUG=0 FINALPACKAGE=1 || {
            echo "::error::Failed to build YTVideoOverlay"
            exit 1
          }
          if [ ! -f packages/*.deb ]; then
            echo "::error::YTVideoOverlay deb file not created"
            exit 1
          fi
          mv packages/*.deb ${{ github.workspace }}/ytvo.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build DontEatMyContent
        if: ${{ inputs.enable_demc }}
        run: |
          set -e
          cd DontEatMyContent
          make clean package DEBUG=0 FINALPACKAGE=1 || {
            echo "::error::Failed to build DontEatMyContent"
            exit 1
          }
          if [ ! -f packages/*.deb ]; then
            echo "::error::DontEatMyContent deb file not created"
            exit 1
          fi
          mv packages/*.deb ${{ github.workspace }}/demc.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Inject tweaks into IPA
        run: |
          set -e
          cd ${{ github.workspace }}
          
          tweaks=("ytplus.deb" "OpenYoutubeSafariExtension.appex")
          
          for f in youpip.deb ytuhd.deb ryd.deb ygs.deb yq.deb ytvo.deb demc.deb; do
            if [ -f "$f" ]; then
              tweaks+=("$f")
              echo "::notice::Including tweak: $f"
            fi
          done
          
          cyan -i youtube.ipa -o "YouTubePlus_${{ inputs.tweak_version }}.ipa" -uwef "${tweaks[@]}" -n "${{ inputs.display_name }}" -b "${{ inputs.bundle_id }}" || {
            echo "::error::Failed to inject tweaks into IPA"
            exit 1
          }

      - name: Validate built IPA
        run: |
          set -e
          if [ ! -f "YouTubePlus_${{ inputs.tweak_version }}.ipa" ]; then
            echo "::error::IPA file not created"
            exit 1
          fi
          
          size=$(stat -f%z "YouTubePlus_${{ inputs.tweak_version }}.ipa")
          echo "::notice::Final IPA size: $size bytes"
          
          if [ $size -lt 50000000 ]; then
            echo "::warning::IPA file seems too small: $size bytes (expected > 50MB)"
          fi
          
          file_type=$(file --mime-type -b "YouTubePlus_${{ inputs.tweak_version }}.ipa")
          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Final IPA validation failed. Detected type: $file_type"
            exit 1
          fi
          
          echo "::notice::IPA validation successful"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4.5.0
        if: always()
        with:
          name: youtube-plus-ipa
          path: YouTubePlus_${{ inputs.tweak_version }}.ipa
          retention-days: 7
          if-no-files-found: warn

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ytp-${{ github.run_number }}
          name: YouTubePlus v${{ inputs.tweak_version }} (${{ github.run_number }})
          files: YouTubePlus_${{ inputs.tweak_version }}.ipa
          draft: true
          body: |
            ## YouTube Plus v${{ inputs.tweak_version }}
            
            **Build Configuration:**
            - Display Name: ${{ inputs.display_name }}
            - Bundle ID: ${{ inputs.bundle_id }}
            - YouPiP: ${{ inputs.enable_youpip }}
            - YTUHD: ${{ inputs.enable_ytuhd }}
            - YouQuality: ${{ inputs.enable_yq }}
            - Return YouTube Dislikes: ${{ inputs.enable_ryd }}
            - DontEatMyContent: ${{ inputs.enable_demc }}
            
            **Installation:**
            Download the IPA and sideload using your preferred method (AltStore, Sideloadly, etc.)

      - name: Cleanup
        if: always()
        run: |
          cd ${{ github.workspace }}
          rm -f *.deb youtube.ipa
          rm -rf YouPiP YTUHD Return-YouTube-Dislikes YouGroupSettings YouQuality YTVideoOverlay DontEatMyContent YoutubeExtensions sdks
          echo "::notice::Cleanup completed"

      - name: Output Release URL
        run: |
          echo "::notice::Release available at: https://github.com/${{ github.repository }}/releases/tag/ytp-${{ github.run_number }}"